<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Authentication | PricePilot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      background: radial-gradient(circle at top right, rgba(108, 99, 255, 0.05), transparent),
                  radial-gradient(circle at bottom left, rgba(34, 211, 165, 0.05), transparent);
    }
    .auth-card {
      width: 100%;
      max-width: 440px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.3);
    }
    .auth-header {
      text-align: center;
      margin-bottom: 32px;
    }
    .auth-tabs {
      display: flex;
      background: var(--bg);
      padding: 4px;
      border-radius: 12px;
      margin-bottom: 32px;
    }
    .auth-tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      border-radius: 8px;
      transition: var(--transition);
      color: var(--text-muted);
    }
    .auth-tab.active {
      background: var(--surface2);
      color: var(--white);
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text-muted);
    }
    .form-input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      color: var(--white);
      font-family: var(--font-main);
      transition: var(--transition);
    }
    .form-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 4px var(--accent-glow);
    }
    .auth-footer {
      margin-top: 24px;
      text-align: center;
      font-size: 0.85rem;
      color: var(--text-muted);
    }
    .auth-footer a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-header">
        <a href="index.html" class="logo-wrap" style="justify-content: center; margin-bottom: 24px;">
          <i data-lucide="compass" style="color: var(--accent);"></i> PricePilot
        </a>
        <h1 id="auth-title">Create your account</h1>
        <p id="auth-subtitle" style="color: var(--text-muted); font-size: 0.9rem; margin-top: 8px;">Start optimizing your revenue today.</p>
      </div>

      <div class="auth-tabs">
        <div class="auth-tab active" onclick="switchTab('signup')">Sign Up</div>
        <div class="auth-tab" onclick="switchTab('login')">Log In</div>
      </div>

      <form id="auth-form" onsubmit="handleAuth(event)">
        <div id="name-field" class="form-group">
          <label>Full Name</label>
          <input type="text" class="form-input" placeholder="Enter your name" required>
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" class="form-input" placeholder="name@company.com" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" class="form-input" placeholder="••••••••" required>
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 10px;">
          <span id="btn-text">Create Account</span>
          <i data-lucide="arrow-right" style="width: 18px; margin-left: 8px;"></i>
        </button>
      </form>

      <div class="auth-footer">
        <p id="auth-toggle-text">Already have an account? <a href="#" onclick="switchTab('login')">Log In</a></p>
      </div>
    </div>
  </div>

  <script>
    lucide.createIcons();

    let currentMode = 'signup';

    function switchTab(mode) {
      currentMode = mode;
      const tabs = document.querySelectorAll('.auth-tab');
      const title = document.getElementById('auth-title');
      const subtitle = document.getElementById('auth-subtitle');
      const btnText = document.getElementById('btn-text');
      const nameField = document.getElementById('name-field');
      const toggleText = document.getElementById('auth-toggle-text');

      tabs.forEach(tab => tab.classList.remove('active'));
      
      if (mode === 'signup') {
        tabs[0].classList.add('active');
        title.innerText = 'Create your account';
        subtitle.innerText = 'Start optimizing your revenue today.';
        btnText.innerText = 'Create Account';
        nameField.style.display = 'block';
        toggleText.innerHTML = 'Already have an account? <a href="#" onclick="switchTab(\'login\')">Log In</a>';
      } else {
        tabs[1].classList.add('active');
        title.innerText = 'Welcome back';
        subtitle.innerText = 'Log in to manage your pricing.';
        btnText.innerText = 'Log In';
        nameField.style.display = 'none';
        toggleText.innerHTML = 'Don\'t have an account? <a href="#" onclick="switchTab(\'signup\')">Sign Up</a>';
      }
    }

    function handleAuth(event) {
      event.preventDefault();
      // Simulation: successful auth redirects to pricing selection
      if (currentMode === 'signup') {
        window.location.href = 'plans.html?new_user=true';
      } else {
        window.location.href = 'preview.html';
      }
    }
  </script>
</body>
</html>
