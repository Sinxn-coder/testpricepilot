<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>System Status | PricePilot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root {
      --bg: #07090f;
      --surface: #121726;
      --accent: #6c63ff;
      --green: #22d3a5;
      --text: #e2e8f0;
      --text-muted: #8e9bb3;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .status-card {
      background: var(--surface);
      padding: 40px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.05);
      text-align: center;
      max-width: 400px;
      width: 90%;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }
    .status-icon {
      width: 64px;
      height: 64px;
      background: rgba(34, 211, 165, 0.1);
      border-radius: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      color: var(--green);
    }
    h1 { font-size: 1.5rem; margin-bottom: 8px; }
    p { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 32px; }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.85rem;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="status-card">
    <div class="status-icon">
      <i data-lucide="check-circle" style="width: 32px; height: 32px;"></i>
    </div>
    <h1>Systems Operational</h1>
    <p>All PricePilot API services and background systems are running normally.</p>
    <a href="index.html" class="btn"><i data-lucide="arrow-left" style="width: 16px;"></i> Back to Home</a>
  </div>
  <script>lucide.createIcons();</script>
</body>
</html>
